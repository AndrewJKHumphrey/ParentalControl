<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Blocked — ParentGuard</title>
  <link rel="stylesheet" href="blocked.css" />
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <h1>Site Blocked</h1>
    <p class="url" id="blocked-url"></p>
    <p class="reason">This website has been blocked by ParentGuard parental controls.</p>
    <button onclick="history.back()">Go Back</button>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const raw = params.get("url") || document.referrer || location.href;
    try {
      const u = new URL(raw);
      document.getElementById("blocked-url").textContent = u.hostname;
    } catch {
      document.getElementById("blocked-url").textContent = "";
    }
  </script>
</body>
</html>
