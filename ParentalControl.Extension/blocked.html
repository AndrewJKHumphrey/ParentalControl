<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Blocked — ParentGuard</title>
  <link rel="stylesheet" href="blocked.css" />
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <h1>Site Blocked</h1>
    <p class="url" id="blocked-url"></p>
    <p class="reason">This website has been blocked by ParentGuard parental controls.</p>
    <button onclick="history.back()">Go Back</button>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const raw = params.get("url") || document.referrer || location.href;
    try {
      const u = new URL(raw);
      document.getElementById("blocked-url").textContent = u.hostname;
    } catch {
      document.getElementById("blocked-url").textContent = "";
    }

    // Apply the app theme selected by the parent in Settings
    chrome.storage.local.get("theme", ({ theme }) => {
      if (!theme) return;
      const s = document.documentElement.style;
      s.setProperty("--bg",        theme.bg);
      s.setProperty("--card-bg",   theme.cardBg);
      s.setProperty("--border",    theme.border);
      s.setProperty("--text",      theme.text);
      s.setProperty("--text-sub",  theme.textSub);
      s.setProperty("--accent",    theme.accent);
      s.setProperty("--url-color", theme.urlColor);
      s.setProperty("--btn-bg",    theme.btnBg);
      s.setProperty("--btn-hover", theme.btnHover);
    });
  </script>
</body>
</html>
